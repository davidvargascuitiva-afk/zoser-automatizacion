name: CI — Zoser Automatización

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Verificar aplicación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-server.txt

      - name: Instalar dependencias del servidor
        run: pip install -r requirements-server.txt

      - name: Verificar que la aplicación Flask importa correctamente
        run: python -c "from app.web.server import app; print('Flask app OK')"

      - name: Verificar ruta principal responde 200
        run: |
          python -c "
          from app.web.server import app
          client = app.test_client()
          r = client.get('/')
          assert r.status_code == 200, f'Ruta / devolvió {r.status_code}, esperaba 200'
          print('Ruta / OK — código', r.status_code)
          "

      - name: Verificar que wsgi.py carga correctamente
        run: python -c "import wsgi; print('wsgi.py OK')"
