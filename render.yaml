services:
  - type: web
    name: zoser-automatizacion
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-server.txt
    startCommand: gunicorn wsgi:app --workers 1 --worker-class gthread --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: FLASK_ENV
        value: production
